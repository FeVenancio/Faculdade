<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Layout Tabela</title>
</head>
<body>
    <nav id="navTable3">
        <ul>
            <li><a href="index.html">Página Principal</a></li>
        </ul>
    </nav>

    <table border="2" id="table3">
        <thead>
            <tr>
                <th colspan="2">HEADER</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <th rowspan="3">MENU</th>
                <th>CONTEÚDO</th>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <th colspan="2">FOOTER</th>
            </tr>
        </tfoot>
    </table>
</body>
</html>
